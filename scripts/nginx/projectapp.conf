server {
    if ($host = www.projectapp.co) {
        return 301 https://$host$request_uri;
    }


    if ($host = projectapp.co) {
        return 301 https://$host$request_uri;
    }


    listen 80;
    server_name projectapp.co www.projectapp.co;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name projectapp.co www.projectapp.co;

    client_max_body_size 10M;

    location = /favicon.ico { access_log off; log_not_found off; }

    # Static files (collected by: python manage.py collectstatic)
    location /static/ {
        alias /home/ryzepeck/webapps/projectapp/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media uploads
    location /media/ {
        alias /home/ryzepeck/webapps/projectapp/backend/media/;
        expires 7d;
    }

    # API endpoints — stricter rate limit
    location /api/ {
        include /etc/nginx/snippets/geo-block.conf;
        limit_req zone=api burst=10 nodelay;
        include proxy_params;
        proxy_pass http://unix:/run/projectapp.sock;
    }

    # Everything else → Gunicorn via Unix socket
    location / {
        include /etc/nginx/snippets/geo-block.conf;
        limit_req zone=general burst=20 nodelay;
        include proxy_params;
        proxy_pass http://unix:/run/projectapp.sock;
    }

    ssl_certificate /etc/letsencrypt/live/projectapp.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/projectapp.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
