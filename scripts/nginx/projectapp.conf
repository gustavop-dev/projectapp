# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name projectapp.co www.projectapp.co;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name projectapp.co www.projectapp.co;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/projectapp.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/projectapp.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # Static files (collected by: python manage.py collectstatic)
    location /static/ {
        alias /home/ryzepeck/webapps/projectapp/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media uploads
    location /media/ {
        alias /home/ryzepeck/webapps/projectapp/backend/media/;
        expires 7d;
    }

    # API endpoints — stricter rate limit
    location /api/ {
        include /etc/nginx/snippets/geo-block.conf;
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://unix:/run/projectapp.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Everything else → Gunicorn via Unix socket
    location / {
        include /etc/nginx/snippets/geo-block.conf;
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://unix:/run/projectapp.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
