<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Es buen momento para retomar tu proyecto? — Project App</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f4f6;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:16px;overflow:hidden;max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="background-color:#059669;padding:32px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:700;letter-spacing:-0.02em;">
                Project App.
              </h1>
              <p style="margin:8px 0 0;color:#d1fae5;font-size:14px;font-weight:400;">
                Transformación Digital
              </p>
            </td>
          </tr>

          <!-- Greeting -->
          <tr>
            <td style="padding:40px 40px 24px;">
              <h2 style="margin:0;color:#1f2937;font-size:22px;font-weight:600;">
                {{ greeting }}
              </h2>
              <p style="margin:16px 0 0;color:#4b5563;font-size:16px;line-height:1.6;">
                {{ body }}
              </p>
              <p style="margin:16px 0 0;color:#4b5563;font-size:16px;line-height:1.6;">
                {{ body_secondary }}
              </p>
            </td>
          </tr>

          <!-- CTA Buttons -->
          <tr>
            <td style="padding:0 40px 16px;text-align:center;">
              <a href="{{ proposal_url }}"
                 style="display:inline-block;background-color:#059669;color:#ffffff;text-decoration:none;padding:16px 40px;border-radius:12px;font-size:16px;font-weight:600;letter-spacing:-0.01em;">
                {{ cta_text }}
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 40px 32px;text-align:center;">
              <a href="https://wa.me/573238122373?text=Hola%2C%20me%20gustar%C3%ADa%20retomar%20la%20propuesta%20que%20ten%C3%ADamos%20pendiente"
                 style="display:inline-block;color:#059669;text-decoration:none;padding:12px 32px;border-radius:12px;font-size:14px;font-weight:600;border:2px solid #059669;">
                💬 Escribir por WhatsApp
              </a>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <hr style="border:none;border-top:1px solid #e5e7eb;margin:0;">
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px 32px;text-align:center;">
              <p style="margin:0 0 8px;color:#6b7280;font-size:14px;line-height:1.5;">
                ¿Dudas? Respondé este correo o escríbenos por
                <a href="https://wa.me/573238122373" style="color:#059669;text-decoration:none;font-weight:600;">WhatsApp</a>
              </p>
              <p style="margin:16px 0 0;color:#9ca3af;font-size:12px;">
                © 2026 ProjectApp.co | Bogotá, Colombia
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
