<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background:#0d0f14; font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0d0f14; padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="520" cellpadding="0" cellspacing="0" style="background:#13161e; border:1px solid rgba(255,255,255,0.07); border-radius:12px; overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="padding:28px 32px 20px; border-bottom:1px solid rgba(255,255,255,0.07);">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="width:32px; height:32px; background:#5b8af0; border-radius:8px; text-align:center; vertical-align:middle; color:#fff; font-weight:700; font-size:13px;">
                    PA
                  </td>
                  <td style="padding-left:10px; font-size:17px; font-weight:600; color:#e8eaf0;">
                    ProjectApp
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:28px 32px;">
              <h1 style="margin:0 0 8px; font-size:20px; font-weight:600; color:#e8eaf0;">
                Código de verificación
              </h1>
              <p style="margin:0 0 24px; font-size:14px; color:#7c8197; line-height:1.6;">
                Usa este código para verificar tu cuenta. Expira en {{ expiry_minutes }} minutos.
              </p>

              <!-- Code box -->
              <table width="100%" cellpadding="0" cellspacing="0" style="background:#1a1e28; border:1px solid rgba(91,138,240,0.3); border-radius:8px; margin-bottom:24px;">
                <tr>
                  <td align="center" style="padding:24px 20px;">
                    <p style="margin:0; font-size:36px; font-weight:700; color:#5b8af0; font-family:monospace; letter-spacing:12px;">
                      {{ code }}
                    </p>
                  </td>
                </tr>
              </table>

              <p style="margin:0; font-size:13px; color:#7c8197; line-height:1.6;">
                Si no solicitaste este código, puedes ignorar este mensaje.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 32px; border-top:1px solid rgba(255,255,255,0.07);">
              <p style="margin:0; font-size:12px; color:#7c8197;">
                Este email fue enviado por ProjectApp.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
